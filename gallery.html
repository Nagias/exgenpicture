<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Image Library — IPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
      background: #f5f2f0;
      color: #323232;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .page-header {
      background: #fff;
      padding: 20px 32px;
      border-bottom: 1px solid rgba(50,50,50,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #323232;
    }

    .page-header .count {
      font-size: 0.85rem;
      color: #999;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-header {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear {
      background: #fff;
      color: #999;
      border: 1px solid rgba(50,50,50,0.1);
    }
    .btn-clear:hover {
      color: #d32f2f;
      border-color: #d32f2f;
    }

    /* ─── Grid ─── */
    .gallery-container {
      padding: 24px 32px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ─── Card ─── */
    .gallery-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(50,50,50,0.04);
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .gallery-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border-color: rgba(0,84,214,0.15);
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-domain {
      font-size: 0.75rem;
      font-weight: 600;
      color: #0054d6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .card-time {
      font-size: 0.65rem;
      color: #bbb;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .card-btn {
      flex: 1;
      padding: 6px 0;
      border: 1px solid rgba(50,50,50,0.08);
      background: #faf8f7;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      color: #666;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card-btn:hover {
      background: #e8f0fe;
      border-color: #0054d6;
      color: #0054d6;
    }

    .card-btn.delete:hover {
      background: #fde8e8;
      border-color: #d32f2f;
      color: #d32f2f;
    }

    /* ─── Empty ─── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }

    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-family: 'Be Vietnam Pro', sans-serif;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>📦 Image Library <span class="count" id="count"></span></h1>
    <div class="header-actions">
      <button class="btn-header btn-clear" id="clearAll">🗑️ Clear All</button>
    </div>
  </div>

  <div class="gallery-container">
    <div class="gallery-grid" id="grid"></div>
    <div class="empty-state" id="empty" style="display:none;">
      <div class="emoji">📭</div>
      <p>Chưa có ảnh nào được phân tích</p>
      <p style="font-size:0.75rem; margin-top:8px; color:#bbb;">Hover vào ảnh → click ✦ để bắt đầu</p>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
